<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Yape</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
.topbar { background: linear-gradient(135deg, #742385, #511973); color: white; padding: 16px 20px; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.topbar i { font-size: 20px; }
.container { max-width: 800px; margin: 0 auto; padding: 16px; }
.card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; color: #333; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card h2 i { color: #742385; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #742385; color: white; }
.btn-primary:hover { background: #8f2da8; }
.btn-danger { background: #d32f2f; color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
input, select { padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; width: 100%; transition: border-color .3s; }
input:focus { border-color: #742385; }
.login-box { max-width: 320px; margin: 60px auto; background: white; border-radius: 16px; padding: 32px 24px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.login-box h2 { margin-bottom: 20px; color: #333; }
.login-box input { margin-bottom: 12px; text-align: center; }
.login-box .btn { width: 100%; }
.error { color: #d32f2f; font-size: 13px; margin-top: 8px; display: none; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 6px; border-bottom: 2px solid #eee; color: #666; font-weight: 600; }
td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-ok { background: #e8f5e9; color: #2e7d32; }
.badge-used { background: #fff3e0; color: #e65100; }
.badge-blocked { background: #ffebee; color: #b71c1c; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; transition: .2s; }
.tab.active { background: #742385; color: white; border-color: #742385; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.cantidad-wrap { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.cantidad-wrap input { width: 80px; text-align: center; }
.cantidad-wrap .btn { flex-shrink: 0; }
.codes-list { max-height: 400px; overflow-y: auto; }
.copy-btn { background: none; border: none; color: #742385; cursor: pointer; font-size: 13px; }
.copy-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="topbar"><i class="fas fa-shield-alt"></i> Panel de Administracion</div>

<div class="container" id="app">
  <div class="login-box" id="loginBox">
    <h2><i class="fas fa-lock"></i> Acceso restringido</h2>
    <input type="password" id="passInput" placeholder="Contrasena de administrador">
    <button class="btn btn-primary" onclick="login()">Ingresar</button>
    <div class="error" id="loginError">Contrasena incorrecta</div>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="tabs">
      <div class="tab active" data-tab="generar" onclick="switchTab('generar')"><i class="fas fa-plus"></i> Generar</div>
      <div class="tab" data-tab="codigos" onclick="switchTab('codigos')"><i class="fas fa-list"></i> Codigos</div>
      <div class="tab" data-tab="dispositivos" onclick="switchTab('dispositivos')"><i class="fas fa-mobile"></i> Dispositivos</div>
      <div class="tab" data-tab="intentos" onclick="switchTab('intentos')"><i class="fas fa-exclamation-triangle"></i> Intentos</div>
    </div>

    <div class="tab-content active" id="tab-generar">
      <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Generar codigos</h2>
        <div class="cantidad-wrap">
          <input type="number" id="cantidadInput" value="5" min="1" max="50">
          <button class="btn btn-primary" onclick="generar()">Generar</button>
        </div>
        <div id="codigosGenerados" style="font-size:13px;color:#555"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-codigos">
      <div class="card">
        <h2><i class="fas fa-list"></i> Codigos <span id="codigosCount" style="font-size:13px;color:#888;font-weight:400"></span></h2>
        <div class="codes-list" id="codigosList"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-dispositivos">
      <div class="card">
        <h2><i class="fas fa-mobile-alt"></i> Dispositivos activados <span id="dispCount" style="font-size:13px;color:#888;font-weight:400"></span></h2>
        <div id="dispositivosList"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-intentos">
      <div class="card">
        <h2><i class="fas fa-exclamation-triangle"></i> Intentos fallidos <span id="intentosCount" style="font-size:13px;color:#888;font-weight:400"></span></h2>
        <div id="intentosList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = '72586048';
let token = null;

function login() {
  const pass = document.getElementById('passInput').value;
  if (pass === ADMIN_PASS) {
    token = pass;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    cargarTodo();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  opts.headers['x-admin-pass'] = token;
  if (opts.body) opts.headers['Content-Type'] = 'application/json';
  const res = await fetch(path, opts);
  return res.json();
}

async function generar() {
  const cant = parseInt(document.getElementById('cantidadInput').value) || 1;
  const data = await api('/api/admin', {
    method: 'POST',
    body: JSON.stringify({ action: 'generar', cantidad: cant })
  });
  if (data.generados) {
    document.getElementById('codigosGenerados').innerHTML =
      '<strong>Codigos generados:</strong><br><code style="font-size:16px;display:block;margin-top:8px">' +
      data.generados.join('</code><br><code style="font-size:16px">') +
      '</code><br><button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="copiarCodigos()">Copiar todos</button>';
    window._ultimosCodigos = data.generados;
    cargarCodigos();
  }
}

function copiarCodigos() {
  if (window._ultimosCodigos) {
    navigator.clipboard.writeText(window._ultimosCodigos.join('\n'));
  }
}

async function bloquear(codigo) {
  await api('/api/admin', {
    method: 'POST',
    body: JSON.stringify({ action: 'block', codigo })
  });
  cargarTodo();
}

async function desbloquear(codigo) {
  await api('/api/admin', {
    method: 'POST',
    body: JSON.stringify({ action: 'unblock', codigo })
  });
  cargarTodo();
}

async function cargarCodigos() {
  const data = await api('/api/admin?action=codigos');
  const container = document.getElementById('codigosList');
  const count = document.getElementById('codigosCount');
  if (!data.codigos || data.codigos.length === 0) {
    container.innerHTML = '<p style="color:#888;font-size:13px">No hay codigos</p>';
    count.textContent = '(0)';
    return;
  }
  count.textContent = `(${data.codigos.length})`;
  let html = '<table><tr><th>Codigo</th><th>Estado</th><th>Dispositivo</th><th>Nombre</th><th>Fecha uso</th><th>Accion</th></tr>';
  data.codigos.forEach(c => {
    let badge;
    if (c.blocked) badge = '<span class="badge badge-blocked">Bloqueado</span>';
    else if (c.used) badge = '<span class="badge badge-used">Usado</span>';
    else badge = '<span class="badge badge-ok">Disponible</span>';

    let accion = '';
    if (c.blocked) {
      accion = `<button class="btn btn-sm btn-primary" onclick="desbloquear('${c.codigo}')">Desbloquear</button>`;
    } else {
      accion = `<button class="btn btn-sm btn-danger" onclick="bloquear('${c.codigo}')">Bloquear</button>`;
    }

    html += `<tr><td><code>${c.codigo}</code></td><td>${badge}</td><td>${c.dispositivo || '-'}</td><td>${c.nombre || '-'}</td><td>${c.fecha_uso ? new Date(c.fecha_uso).toLocaleString() : '-'}</td><td>${accion}</td></tr>`;
  });
  html += '</table>';
  container.innerHTML = html;
}

async function cargarDispositivos() {
  const data = await api('/api/admin?action=dispositivos');
  const container = document.getElementById('dispositivosList');
  const count = document.getElementById('dispCount');
  if (!data.dispositivos || data.dispositivos.length === 0) {
    container.innerHTML = '<p style="color:#888;font-size:13px">No hay dispositivos activados</p>';
    count.textContent = '(0)';
    return;
  }
  count.textContent = `(${data.dispositivos.length})`;
  let html = '<table><tr><th>Nombre</th><th>ID</th><th>Codigo</th><th>Fecha</th></tr>';
  data.dispositivos.forEach(d => {
    const name = d.nombre || '-';
    html += `<tr><td>${name}</td><td><code style="font-size:11px">${d.id}</code></td><td>${d.codigo}</td><td>${new Date(d.fecha).toLocaleString()}</td></tr>`;
  });
  html += '</table>';
  container.innerHTML = html;
}

async function cargarIntentos() {
  const data = await api('/api/admin?action=intentos');
  const container = document.getElementById('intentosList');
  const count = document.getElementById('intentosCount');
  if (!data.intentos || data.intentos.length === 0) {
    container.innerHTML = '<p style="color:#888;font-size:13px">No hay intentos fallidos</p>';
    count.textContent = '(0)';
    return;
  }
  count.textContent = `(${data.intentos.length})`;
  let html = '<table><tr><th>Codigo</th><th>Motivo</th><th>Dispositivo</th><th>Fecha</th><th>Accion</th></tr>';
  data.intentos.forEach(i => {
    let motivoTxt = 'Codigo invalido';
    if (i.motivo === 'codigo_ya_usado') motivoTxt = 'Ya usado (mismo disp.)';
    else if (i.motivo === 'compartido_a_otro') motivoTxt = 'Compartido a otro dispositivo';
    else if (i.motivo === 'reintento_mismo') motivoTxt = 'Reintento del mismo disp.';
    html += `<tr><td><code>${i.codigo}</code></td><td>${motivoTxt}</td><td><code style="font-size:11px">${i.dispositivo}</code></td><td>${new Date(i.fecha).toLocaleString()}</td><td><button class="btn btn-sm btn-danger" onclick="bloquear('${i.codigo}')">Bloquear</button></td></tr>`;
  });
  html += '</table>';
  container.innerHTML = html;
}

function cargarTodo() {
  cargarCodigos();
  cargarDispositivos();
  cargarIntentos();
}
</script>
</body>
</html>
