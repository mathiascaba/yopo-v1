<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yape</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #742385 0%, #511973 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { margin-top: 16px; font-size: 14px; opacity: 0.8; }
    </style>
    <script>
        localStorage.setItem('sesion_iniciada', 'true');
        localStorage.setItem('pase_vip_activo', 'true');
        window.location.replace('inicio.html');
    </script>
</head>
<body>
    <div style="text-align:center">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>
</body>
</html>
